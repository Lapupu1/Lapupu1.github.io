<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cute Start Page</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: "Trebuchet MS", sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        overflow:hidden;
        background: linear-gradient(135deg, #ffd6ec, #d6f0ff);
    }

    .bg-hearts{
        position:absolute;
        width:100%;
        height:100%;
        overflow:hidden;
        z-index:0;
    }

    .heart{
        position:absolute;
        top:-50px;
        opacity:0.8;
        animation: rain 8s linear infinite;
        font-size:26px;
    }

    @keyframes rain{
        from{ transform:translateY(-120vh) rotate(0deg); }
        to{ transform:translateY(120vh) rotate(360deg); }
    }

    .card{
        position:relative;
        z-index:1;
        background: rgba(255,255,255,0.25);
        backdrop-filter: blur(12px);
        padding:40px;
        border-radius:30px;
        text-align:center;
        box-shadow:0 10px 30px rgba(0,0,0,0.15);
        width:320px;
        border:2px solid rgba(255,255,255,0.4);
    }

    .top-section{
        background:url('https://i.pinimg.com/originals/80/80/73/8080732eea968a5ec482c22f9912cf7d.gif');
        background-size:cover;
        background-position:center;
        border-radius:20px;
        padding:25px 15px;
        margin-bottom:20px;
        position:relative;
        overflow:hidden;
    }

    .top-section::before{
        content:"";
        position:absolute;
        inset:0;
        background:rgba(0,0,0,0.25);
    }

    .top-section h1{
        position:relative;
        z-index:1;
        color:white;
        font-size:2rem;
        font-weight:900;
        white-space:nowrap;
        text-shadow:0 2px 10px rgba(0,0,0,0.4);
        margin-bottom:10px;
    }

    .start-btn{
        position:relative;
        z-index:1;

        border:none;
        padding:15px 35px;
        font-size:1.1rem;
        border-radius:999px;
        cursor:pointer;

        background:white;
        color:#ff69b4;
        font-weight:bold;
        transition:0.25s ease;
        box-shadow:0 5px 15px rgba(0,0,0,0.15);
    }

    .start-btn:hover{
        transform:scale(1.08);
        background:#ffe6f3;
    }

    p{
        color:white;
        margin-bottom:25px;
        font-size:1rem;
        font-weight:700;

        text-shadow:
            0 0 3px rgba(255,255,255,0.7),
            0 0 8px rgba(255,255,255,0.4),
            0 2px 6px rgba(0,0,0,0.3);
    }

    .welcome{
        margin-top:20px;
        color:white;
        font-size:1.1rem;
        font-weight:800;
        white-space:nowrap;
        animation: fadeIn 1s ease;

        text-shadow:
            0 0 5px rgba(255,255,255,0.8),
            0 0 12px rgba(255,105,180,0.6),
            0 0 18px rgba(255,105,180,0.3);
    }

    .hidden{ display:none; }

    @keyframes fadeIn{
        from{ opacity:0; transform:translateY(10px); }
        to{ opacity:1; transform:translateY(0); }
    }
</style>
</head>

<body>

<audio id="bgMusic" loop preload="auto">
    <source src="https://raw.githubusercontent.com/Lapupu1/Lapupu1.github.io/7ed110d62d2cc7c278f456afa7371e0e087c2f0c/Music.mp3" type="audio/mpeg">
</audio>

<div class="bg-hearts">
    <div class="heart" style="left:10%; animation-delay:0s;">🐹</div>
    <div class="heart" style="left:25%; animation-delay:2s;">🐹</div>
    <div class="heart" style="left:40%; animation-delay:4s;">🐹</div>
    <div class="heart" style="left:60%; animation-delay:1s;">🐹</div>
    <div class="heart" style="left:80%; animation-delay:3s;">🐹</div>
</div>

<div class="card">

    <div class="top-section">
        <h1>✨ Hello ✨</h1>

        <button class="start-btn" onclick="startSite()">
            Start
        </button>
    </div>

    <p>Welcome to your cute little website!</p>

    <div id="welcomeText" class="welcome hidden">
        🌸 Have fun exploring! 🌸
    </div>
</div>

<script>
function startSite(){

    // show text
    document.getElementById("welcomeText").classList.remove("hidden");

    // start music
    const music = document.getElementById("bgMusic");
    music.volume = 0.4;
    music.play().catch(err => console.log(err));

    // wait 10 seconds then go to next page
    setTimeout(() => {
        window.location.href = "next.html";
    }, 10000);
}
</script>

</body>
</html>
