<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Next Page</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: "Trebuchet MS", sans-serif;
    }

    body{
        height:100vh;
        overflow:hidden;
        background: linear-gradient(135deg, #ffd6ec, #d6f0ff);
        display:flex;
        justify-content:center;
        align-items:center;
        color:white;
        text-shadow:0 2px 10px rgba(0,0,0,0.4);
    }

    .card{
        text-align:center;
        padding:40px;
    }

    h1{
        font-size:2rem;
        font-weight:900;
        margin-bottom:10px;
    }

    p{
        font-size:1rem;
        font-weight:600;
    }

    /* 🌸 Centered Next Button */
    .next-btn{
        position:absolute;
        bottom:18px;
        right:18px;

        border:none;
        padding:10px 16px;
        border-radius:999px;
        cursor:pointer;

        background:white;
        color:#ff69b4;
        font-weight:bold;
        font-size:0.9rem;

        display:flex;
        align-items:center;
        justify-content:center;
        gap:6px;

        box-shadow:0 5px 15px rgba(0,0,0,0.15);
        transition:0.25s ease;
    }

    .next-btn:hover{
        transform:scale(1.08);
        background:#ffe6f3;
    }
</style>
</head>

<body>

<div class="card">
    <h1>🌸 Welcome to Page 2 🌸</h1>
    <p>More cute stuff coming soon!</p>
</div>

<button class="next-btn" onclick="goNext()">
    Next <span style="font-size:1.4rem; font-weight:900;">→</span>
</button>

<script>
function goNext(){
    alert("You clicked Next! 🎀");
    // window.location.href = "page3.html";
}
</script>

</body>
</html>
